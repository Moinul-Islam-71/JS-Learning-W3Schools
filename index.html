<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h2>
        What Can JavaScript Do?
    </h2>

    <p id="demo">
        JavaScript can change HTML content.
    </p>

    <p>
        In this case JavaScript changes the value of the src (source) attribute of an image.
    </p>

    <button onclick="document.getElementById(`myLight`).src = `pic_bulbon.gif`">
        Turn on 
    </button>
    
    <img id="myLight" src="pic_bulboff.gif" alt="bulb_Off">
    
    <button onclick="document.getElementById(`myLight`).src = `pic_bulboff.gif`">
        Turn off 
    </button>
</body>
</html>
